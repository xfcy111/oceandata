name: build-yangliu-seasonal

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-seasonal-json:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Build seasonal data JSON
        run: |
          python tools/build_yangliu_seasonal_data.py --output data/yangliu-seasonal-v1.json --cache .cache/yangliu-seasonal

      - name: Commit updated seasonal data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/yangliu-seasonal-v1.json
          if git diff --cached --quiet; then
            echo "No seasonal data changes to commit."
          else
            git commit -m "Update seasonal ocean data"
            git push
          fi
